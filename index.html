<!DOCTYPE html>
<html>
<head>
<title>Roxxon-News</title>

<style>

body{
background:#0b0f18;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:black;
border-bottom:2px solid red;
padding:15px;
font-size:24px;
color:red;
}

.city{
background:url("https://images.unsplash.com/photo-1514565131-fce0801e5785");
background-size:cover;
height:180px;
display:flex;
align-items:end;
padding:15px;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:1fr 2fr;
}

.sidebar{
border-right:2px solid red;
padding:20px;
}

.feed{
padding:20px;
}

.comment{
background:#111827;
border:1px solid red;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

.time{
font-size:12px;
color:gray;
}

textarea{
width:100%;
height:60px;
}

button{
background:red;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
ROXXON-NEWS
</div>

<div class="city">
New York City
</div>

<div class="container">

<div class="sidebar">

<h3>Weather</h3>

<div id="weather">
Loading weather...
</div>

</div>

<div class="feed">

<h3>City Feed</h3>

<div id="comments"></div>

<textarea id="commentInput" placeholder="Type a comment..."></textarea>

<button onclick="postComment()">Post</button>

</div>

</div>

<script>

function postComment(){

let text = document.getElementById("commentInput").value

if(text === "") return

let time = new Date().toLocaleTimeString()

let comment = document.createElement("div")

comment.className = "comment"

comment.innerHTML = text + "<div class='time'>" + time + "</div>"

document.getElementById("comments").prepend(comment)

document.getElementById("commentInput").value=""

}

async function getWeather(){

let response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.00&current_weather=true")

let data = await response.json()

document.getElementById("weather").innerHTML =
data.current_weather.temperature + "°C"

}

getWeather()

</script>

</body>
</html>
